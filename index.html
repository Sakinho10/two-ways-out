<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#26241f">
<title>Case No. 4471 — Two Ways Out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --concrete:#26241f;
    --concrete-panel:#312e28;
    --manila:#d9c9a0;
    --manila-dim:#a99a78;
    --rust:#b0501f;
    --rust-dim:#7a3c19;
    --sanction:#8f2a20;
    --ink:#e9e1cb;
    --ink-dim:#a49a82;
    --line:#4a4640;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #3a362e 0%, var(--concrete) 60%);
    color:var(--ink);
    font-family:'Special Elite', monospace;
    display:flex;
    justify-content:center;
    padding:24px 12px 60px;
    padding-top:max(24px, env(safe-area-inset-top));
    padding-bottom:max(60px, env(safe-area-inset-bottom));
    padding-left:max(12px, env(safe-area-inset-left));
    padding-right:max(12px, env(safe-area-inset-right));
    min-height:100%;
  }
  .wrap{ width:100%; max-width:640px; }

  /* header */
  .masthead{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:3px double var(--line);
    padding-bottom:10px; margin-bottom:16px;
  }
  .masthead h1{
    font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:2px;
    font-size:22px; margin:0; color:var(--ink); text-transform:uppercase;
  }
  .masthead h1.tappable{
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .masthead h1.tappable:hover{ color:var(--manila-dim); }
  .masthead h1.tappable:active{ color:var(--manila); }
  .masthead .case{
    font-family:'Oswald',sans-serif; font-size:13px; color:var(--ink-dim);
    letter-spacing:1px;
  }
  .day-badge{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:34px;
    color:var(--manila); line-height:1; text-align:right;
  }
  .day-badge span{display:block; font-size:11px; font-weight:400; color:var(--ink-dim); letter-spacing:2px;}

  /* dual gauge — signature element */
  .gauge-block{ margin-bottom:18px; }
  .gauge-labels{ display:flex; justify-content:space-between; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; margin-bottom:4px; }
  .gauge-labels .just{color:var(--manila);} .gauge-labels .esc{color:var(--rust);}
  .gauge{
    position:relative; height:26px; background:var(--concrete-panel);
    border:1px solid var(--line); overflow:hidden;
  }
  .gauge-fill-just{
    position:absolute; left:0; top:0; bottom:0;
    background:repeating-linear-gradient(90deg, var(--manila-dim) 0 2px, var(--manila) 2px 4px);
    transition:width .5s ease;
  }
  .gauge-fill-esc{
    position:absolute; right:0; top:0; bottom:0;
    background:repeating-linear-gradient(90deg, var(--rust-dim) 0 3px, var(--rust) 3px 6px);
    transition:width .5s ease;
  }
  .gauge-mid{ position:absolute; left:50%; top:-4px; bottom:-4px; width:1px; background:var(--line); }

  /* stat row */
  .stats{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:18px; }
  .stat{
    background:var(--concrete-panel); border:1px solid var(--line); padding:8px 10px;
  }
  .stat .k{ font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; color:var(--ink-dim); text-transform:uppercase; }
  .stat .v{ font-family:'Oswald',sans-serif; font-size:18px; color:var(--ink); }
  .stat.warn .v{ color:var(--sanction); }

  /* log */
  .log{
    background:var(--concrete-panel); border:1px solid var(--line);
    padding:14px 16px; margin-bottom:18px; min-height:88px;
    font-size:15px; line-height:1.55; color:var(--ink);
    white-space:pre-line;
  }
  .log .tag{ color:var(--manila-dim); font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; display:block; margin-bottom:6px;}

  /* actions */
  .section-label{
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:2px; color:var(--ink-dim);
    text-transform:uppercase; margin:0 0 8px 2px;
  }
  .actions{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  button.action{
    font-family:'Special Elite',monospace; font-size:15px; text-align:left;
    color:var(--ink); background:var(--concrete-panel); border:1px solid var(--line);
    border-left:4px solid var(--line);
    padding:14px 16px; min-height:48px; cursor:pointer; transition:.15s;
    -webkit-tap-highlight-color:transparent;
  }
  button.action:hover:not(:disabled){ background:#3a362e; border-left-color:var(--manila); }
  button.action.esc:hover:not(:disabled){ border-left-color:var(--rust); }
  button.action:active:not(:disabled){ background:#3a362e; }
  button.action:disabled{ opacity:.35; cursor:not-allowed; }
  button.action .desc{ display:block; font-size:12px; color:var(--ink-dim); margin-top:4px; font-family:'Oswald',sans-serif; letter-spacing:.3px;}
  button.action.attempt{ border-left-color:var(--manila); font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:13px;}
  button.action.attempt.esc{ border-left-color:var(--rust); }

  /* category cards (mobile-first grouping) */
  button.category{
    font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    font-size:15px; text-align:left; color:var(--ink);
    background:var(--concrete-panel); border:1px solid var(--line); border-left:5px solid var(--manila-dim);
    padding:16px 16px; min-height:56px; cursor:pointer; transition:.15s;
    -webkit-tap-highlight-color:transparent;
  }
  button.category.esc{ border-left-color:var(--rust-dim); }
  button.category.neutral{ border-left-color:var(--ink-dim); }
  button.category:active{ background:#3a362e; }
  button.category .desc{ display:block; font-size:12px; font-weight:400; letter-spacing:.3px; color:var(--ink-dim); text-transform:none; margin-top:5px; font-family:'Special Elite',monospace; }

  .back-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink-dim); background:none; border:none; padding:8px 2px; margin-bottom:10px; cursor:pointer;
  }
  .back-btn:active{ color:var(--ink); }

  @keyframes pulse-just{ 0%{color:var(--manila); text-shadow:0 0 8px rgba(217,201,160,.7);} 100%{color:var(--ink); text-shadow:none;} }
  @keyframes pulse-esc{ 0%{color:var(--rust); text-shadow:0 0 8px rgba(176,80,31,.7);} 100%{color:var(--ink); text-shadow:none;} }
  @keyframes pulse-warn{ 0%{color:var(--sanction); text-shadow:0 0 8px rgba(143,42,32,.7);} 100%{color:inherit; text-shadow:none;} }
  .pulse-up{ animation:pulse-just .9s ease-out; }
  .pulse-down{ animation:pulse-esc .9s ease-out; }
  .pulse-warn{ animation:pulse-warn .9s ease-out; }

  .restart-link{
    display:inline-block; margin-top:4px; margin-right:14px;
    font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink-dim); background:none; border:none; padding:4px 0; cursor:pointer;
    -webkit-tap-highlight-color:transparent; text-decoration:underline; text-underline-offset:2px;
  }
  .restart-link:last-of-type{ margin-right:0; }
  .restart-link:active{ color:var(--ink); }

  .confirm-banner{
    background:var(--sanction); color:var(--ink);
    padding:12px 14px; margin-bottom:14px;
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.3px;
    display:flex; flex-direction:column; gap:10px;
  }
  .confirm-banner .msg{ line-height:1.4; }
  .confirm-banner .btns{ display:flex; gap:10px; }
  .confirm-banner button{
    flex:1; padding:10px; min-height:40px; cursor:pointer;
    font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:12px;
    border:1px solid var(--ink); background:none; color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  .confirm-banner button.confirm-yes{ background:var(--ink); color:var(--sanction); }
  .confirm-banner button:active{ opacity:.8; }

  .restart{
    display:block; width:100%; margin-top:10px; padding:16px;
    min-height:48px;
    font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    background:none; border:1px solid var(--ink-dim); color:var(--ink-dim); cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .restart:active{ color:var(--ink); border-color:var(--ink); }

  .ending{
    text-align:center; padding:30px 10px;
  }
  .ending h2{ font-family:'Oswald',sans-serif; letter-spacing:1px; font-size:24px; margin-bottom:6px;}
  .ending .days{ font-family:'Oswald',sans-serif; font-size:46px; color:var(--manila); margin:10px 0;}
  .ending .days span{ display:block; font-size:12px; color:var(--ink-dim); letter-spacing:2px; }
  .ending p{ font-size:15px; line-height:1.6; color:var(--ink); max-width:480px; margin:0 auto 6px; }

  .grade-block{ margin:22px 0 4px; padding-top:16px; border-top:1px solid var(--line); }
  .grade-letter{ font-family:'Oswald',sans-serif; font-weight:700; font-size:56px; color:var(--manila); line-height:1; }
  .grade-comment{ font-size:14px; line-height:1.6; color:var(--ink); max-width:480px; margin:10px auto 6px; }
  .grade-score{ font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--ink-dim); text-transform:uppercase; }
  .elite-badge{
    display:inline-block; margin-top:12px; padding:10px 14px;
    border:1px solid var(--rust); color:var(--rust);
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    max-width:480px;
  }

  .loss-block{ margin:22px 0 4px; padding-top:16px; border-top:1px solid var(--line); }
  .loss-tag{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:18px; letter-spacing:1px;
    color:var(--sanction); text-transform:uppercase;
  }

  .trial-countdown{
    font-family:'Oswald',sans-serif; font-size:11px; color:var(--ink-dim);
    letter-spacing:1px; text-align:right; margin-top:4px;
  }

  /* home / title-card screen */
  .home-card{
    background:var(--concrete-panel); border:1px solid var(--line);
    padding:28px 22px; margin-bottom:10px;
  }
  .home-title{
    font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:3px;
    font-size:15px; color:var(--rust); text-transform:uppercase; margin-bottom:6px;
  }
  .home-subtitle{
    font-family:'Special Elite',monospace; font-size:32px; color:var(--manila);
    margin-bottom:18px;
  }
  .home-body{
    font-size:15px; line-height:1.65; color:var(--ink); margin:0 0 8px;
  }
  .home-links{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .home-link{
    background:none; border:none; color:var(--manila-dim);
    text-decoration:underline; text-underline-offset:2px;
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.5px;
    text-align:left; padding:6px 2px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .home-link:active{ color:var(--manila); }

  /* masthead reference ("?") button */
  .ref-btn{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:13px;
    width:24px; height:24px; border-radius:50%; flex:none;
    border:1px solid var(--ink-dim); color:var(--ink-dim); background:none;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .ref-btn:active{ color:var(--ink); border-color:var(--ink); }

  /* reference overlay */
  .ref-overlay{
    position:fixed; inset:0; background:rgba(18,16,13,.93);
    display:flex; justify-content:center; padding:24px 12px;
    padding-top:max(24px, env(safe-area-inset-top));
    padding-bottom:max(24px, env(safe-area-inset-bottom));
    overflow-y:auto; z-index:500;
  }
  .ref-panel{
    background:var(--concrete-panel); border:1px solid var(--line);
    width:100%; max-width:640px; padding:18px 18px 20px; height:fit-content;
  }
  .ref-header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .ref-close{
    background:none; border:1px solid var(--line); color:var(--ink);
    font-size:18px; line-height:1; padding:5px 11px; cursor:pointer;
    font-family:'Oswald',sans-serif; -webkit-tap-highlight-color:transparent;
  }
  .ref-close:active{ color:var(--manila); }
  .ref-tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .ref-tab{
    font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; text-transform:uppercase;
    background:var(--concrete); border:1px solid var(--line); color:var(--ink-dim);
    padding:7px 9px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .ref-tab.active{ color:var(--manila); border-color:var(--manila-dim); }
  .ref-body{
    font-size:15px; line-height:1.65; color:var(--ink); margin-bottom:16px;
    white-space:pre-wrap;
  }
  .ref-nav{ display:flex; gap:10px; }
  .ref-nav .back-btn{ border:1px solid var(--line); padding:8px 12px; margin:0; }
  .ref-nav .back-btn:disabled{ opacity:.3; cursor:not-allowed; }

  ::selection{ background:var(--manila); color:#222; }

  /* leaderboard */
  .lb-namebox, .lb-submitbox{
    background:var(--concrete-panel); border:1px solid var(--line);
    padding:14px 16px; margin:16px auto 0; max-width:480px;
    display:flex; flex-direction:column; gap:10px; text-align:left;
  }
  .lb-input{
    font-family:'Special Elite',monospace; font-size:15px;
    background:var(--concrete); border:1px solid var(--line); color:var(--ink);
    padding:10px 12px; width:100%;
  }
  .lb-error{
    background:var(--concrete-panel); border:1px solid var(--sanction); color:var(--ink);
    padding:12px 14px; margin:12px auto 0; max-width:480px;
    font-size:13px; line-height:1.5; text-align:left; display:flex; flex-direction:column; gap:8px;
  }
  .lb-msg{
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.5px; color:var(--manila);
    margin:16px auto 0; max-width:480px; text-align:center;
  }
  .share-note{
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.5px; color:var(--manila-dim);
    margin:8px auto 0; max-width:480px; text-align:center;
  }
  .share-manual{
    display:block; width:100%; max-width:480px; margin:8px auto 0;
    font-family:'Special Elite',monospace; font-size:13px; line-height:1.5;
    background:var(--concrete-panel); border:1px solid var(--line); color:var(--ink);
    padding:10px 12px; resize:none;
  }
  .lb-tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .lb-list{ display:flex; flex-direction:column; gap:6px; }
  .lb-row{
    display:flex; align-items:center; gap:10px;
    background:var(--concrete-panel); border:1px solid var(--line);
    padding:10px 12px;
  }
  .lb-rank{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:16px; color:var(--manila-dim);
    width:26px; text-align:center; flex:none;
  }
  .lb-info{ flex:1; min-width:0; text-align:left; }
  .lb-name{ font-size:15px; color:var(--ink); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .lb-meta{ font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.3px; color:var(--ink-dim); margin-top:2px; }
  .lb-grade{ font-family:'Oswald',sans-serif; font-weight:700; font-size:18px; color:var(--manila); flex:none; }
  .lb-elite{
    font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:1px; color:var(--rust);
    border:1px solid var(--rust); padding:2px 5px; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const SUPABASE_URL = 'https://kyuzjtxrgkqlbezxcefi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oGlIMdfYzK2JL-yayy7fHQ_mn4wjFof';
const LEADERBOARD_TABLE = 'leaderboard';
// Update once the custom domain discussed in an earlier session is live.
const SHARE_URL = 'https://sakinho10.github.io/two-ways-out';

const S = {
  view: 'home',
  referenceOpen: false,
  referenceReturnView: null,
  referencePage: 0,
  playerHandle: null,
  editingHandle: false,
  handleError: null,
  submittedThisGame: false,
  submitState: 'idle', // idle | submitting | done | error
  submitError: null,
  leaderboardEntries: null,
  leaderboardLoading: false,
  leaderboardError: null,
  leaderboardFilter: 'all',
  leaderboardReturnView: null,
  day: 1,
  durationMs: 0,
  sessionStartTs: null,
  family: 15,
  lawyer: 0,
  media: 0,
  pipelineMilestones: {},
  pipelineBonus: 0,
  connections: 15,
  evidence: 5,
  escapePlan: 5,
  suspicion: 10,
  log: "You wake up on the concrete shelf they call a bunk. Four hundred and some days since they brought you in for a robbery you didn't commit. Nobody's listening yet. Today, you decide what kind of man gets you out.",
  over: false,
  ending: null,
  todayMoves: [],
  unlockedMoveIds: [],
  lastActionId: null,
  actionStreak: 0,
  scenario: null,
  profile: null,
  actionCounts: { library:0, guard:0, letters:0, crew:0, scout:0, bribe:0, rest:0 },
  justiceAttemptsLeft: 3,
  justiceCooldownUntil: 0,
  escapeAttemptsUsed: 0,
  justiceAttemptsUsed: 0,
  appealsUsed: 0,
  trialDeadline: null,
  pendingConfirm: null,
  shareStatus: null, // null | 'copied' | 'manual' | 'error'
  shareError: null
};

const SAVE_KEY = 'twoWaysOutSave-v4';

function saveState(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){ /* storage unavailable, ignore */ }
}

function loadState(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const saved = JSON.parse(raw);
    Object.assign(S, saved);
    return true;
  }catch(e){ return false; }
}

function clearSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){ /* ignore */ }
}

// Player handle: a persistent identity distinct from any single playthrough,
// stored under its own key so "new game"/restart resets never touch it.
const HANDLE_KEY = 'twoWaysOutHandle-v1';

function loadPlayerHandle(){
  try{
    const raw = localStorage.getItem(HANDLE_KEY);
    if(raw) S.playerHandle = raw;
  }catch(e){ /* storage unavailable, ignore */ }
}

function savePlayerHandle(handle){
  try{ localStorage.setItem(HANDLE_KEY, handle); }catch(e){ /* ignore */ }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// track previous stat values to animate the ones that changed on next render
let prevStats = { connections:S.connections, evidence:S.evidence, escapePlan:S.escapePlan, suspicion:S.suspicion };

function clamp(v){ return Math.max(0, Math.min(100, v)); }

// stat -> reward multiplier: 0.6x at stat 0, 1.0x at stat 50, 1.4x at stat 100
function statFactor(v){ return 0.6 + (v/100)*0.8; }

// composure -> suspicion-gain multiplier: HIGH composure means LESS suspicion picked up.
// 1.4x at composure 0 (rattles easily), 1.0x at 50, 0.6x at 100 (ice cold).
function composureFactor(v){ return 1.4 - (v/100)*0.8; }

const PROFILES = [
  {
    id:'strategist', name:'The Strategist',
    tagline:'Sharp mind, soft hands.',
    desc:"You think three moves ahead. You have never won a fight in your life.",
    stats:{ intellect:85, physique:25, charisma:50, composure:55 }
  },
  {
    id:'giant', name:'The Gentle Giant',
    tagline:'Everyone likes him. Paperwork is not his thing.',
    desc:"People take to you on sight, guards included. Reading a legal brief gives you a headache.",
    stats:{ intellect:30, physique:90, charisma:70, composure:65 }
  },
  {
    id:'manipulator', name:'The Manipulator',
    tagline:'Brilliant. Unsettling. Never fully believed.',
    desc:"You can talk almost anyone into almost anything — except into forgetting how you make their skin crawl.",
    stats:{ intellect:80, physique:50, charisma:65, composure:30 }
  },
  {
    id:'everyman', name:'The Everyman',
    tagline:'No edge. No exploit. Steady.',
    desc:"Nothing about you stands out, including your problems. You keep an even keel better than most.",
    stats:{ intellect:55, physique:55, charisma:55, composure:70 }
  }
];

// Soft-gated pipeline ramp: a stage always produces SOMETHING even when the
// stage feeding it is at 0 (the floor), scaling up to full efficiency once
// the feeder stage crosses its threshold. Family itself is never gated —
// only Lawyer (off Family) and Media (off Lawyer) ramp this way. The
// threshold/floor pair is no longer fixed — it comes from the active
// scenario's `scrutiny` block (see SCENARIOS below), so a high-scrutiny
// case throttles this ramp without touching the function itself.
function rampEfficiency(source, threshold, floor){
  return floor + (1 - floor) * Math.min(1, source / threshold);
}

// Difficulty Scenarios: picked before profile selection, this is the
// wrongful-conviction premise itself, and it shifts difficulty ASYMMETRICALLY
// across Justice and Escape rather than one global multiplier. Three knobs
// per tier:
//   security  — throttles the Escape path: suspicion accumulated from any
//               positive gain, escapePlan growth, the escalation penalty for
//               repeated failed escape attempts, and (Hard+) a distinct
//               "hostile guard" chance that the guard-favor action backfires
//               outright plus a lower threshold before guards turn on you.
//   scrutiny  — throttles the Credibility pipeline's Lawyer/Media stages:

// Credibility pipeline: Family -> Lawyer -> Media. Each is a hidden 0-100
// stat; none of the three are shown in the UI. Crossing a threshold on any
// of them permanently and silently adds to S.pipelineBonus (see below),
// with a one-time narrative beat appended to the log.
const MILESTONES = [
  { stage:'family', at:25, bonus:0.5,  text:'Your sister starts visiting every week, notebook in hand, asking sharper questions than she used to.' },
  { stage:'family', at:60, bonus:1,    text:"Your parents scrape together enough for a real paralegal — not just whatever the public defender's office can spare." },
  { stage:'family', at:90, bonus:1.5,  text:"Your family remortgages what's left of the house. There's no version of this where they walk away clean either." },
  { stage:'lawyer',  at:25, bonus:0.75, text:"A public defender finally reads your file past the intake summary." },
  { stage:'lawyer',  at:60, bonus:1.5,  text:"Your lawyer files a formal motion for review — the first paperwork that isn't just a form letter." },
  { stage:'lawyer',  at:90, bonus:2.25, text:"Your lawyer brings in an outside expert witness willing to testify." },
  { stage:'media',   at:25, bonus:0.5,  text:"A local court-watch blog lists your case among others worth a second look." },
  { stage:'media',   at:60, bonus:1,    text:"A reporter calls your lawyer's office asking for an interview." },
  { stage:'media',   at:90, bonus:1.5,  text:"Your case leads the six o'clock news. The DA's office does not enjoy this kind of attention." }
];

function checkMilestones(){
  const scrutiny = S.scenario && S.scenario.scrutiny;
  const bonusMult = scrutiny ? scrutiny.pipelineBonusMult : 1;
  const bonusCap = scrutiny && scrutiny.pipelineBonusCap != null ? scrutiny.pipelineBonusCap : Infinity;
  for(const m of MILESTONES){
    const key = m.stage + m.at;
    if(!S.pipelineMilestones[key] && S[m.stage] >= m.at){
      S.pipelineMilestones[key] = true;
      S.pipelineBonus = Math.min(bonusCap, S.pipelineBonus + m.bonus*bonusMult);
      S.log += `\n\n${m.text}`;
    }
  }
}

function applyDelta(d){
  if(d.family){
    let f = d.family;
    // scrutiny/family scenario knob: growth rate, plus a soft cap on the
    // stat itself (Very Hard) that's lower than the general 0-100 clamp
    if(f > 0 && S.scenario) f = Math.round(f * S.scenario.family.growthMult);
    const cap = S.scenario ? S.scenario.family.cap : 100;
    S.family = Math.max(0, Math.min(cap, S.family + f));
  }
  if(d.lawyer) S.lawyer = clamp(S.lawyer + d.lawyer);
  if(d.media) S.media = clamp(S.media + d.media);
  if(d.connections) S.connections = clamp(S.connections + d.connections);
  if(d.evidence) S.evidence = clamp(S.evidence + d.evidence);
  if(d.escapePlan){
    let p = d.escapePlan;
    // security scenario knob: throttles Escape Plan growth specifically
    if(p > 0 && S.scenario) p = Math.round(p * S.scenario.security.escapePlanMult);
    S.escapePlan = clamp(S.escapePlan + p);
  }
  if(d.suspicion){
    let s = d.suspicion;
    // composure and the scenario's security level only soften INCREASES in
    // suspicion, never the relief from resting
    if(s > 0){
      if(S.profile) s *= composureFactor(S.profile.stats.composure);
      if(S.scenario) s *= S.scenario.security.suspicionMult;
      s = Math.round(s);
    }
    S.suspicion = clamp(S.suspicion + s);
  }
  checkMilestones();
  checkMoveUnlocks();
}

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

};

function actionById(id){ return ACTIONS.find(a=>a.id===id); }

function checkMoveUnlocks(){
  for(const id of MILESTONE_MOVE_IDS){
    if(!S.unlockedMoveIds.includes(id) && MOVE_UNLOCK_CONDITIONS[id]()){
      S.unlockedMoveIds.push(id);
    }
  }
}

function getAvailableMovePool(){
  const ids = [...BASE_MOVE_IDS];
  for(const id of MILESTONE_MOVE_IDS){
    if(S.unlockedMoveIds.includes(id)) ids.push(id);
  }
  if(S.profile && PROFILE_SIGNATURE_MOVE[S.profile.id]) ids.push(PROFILE_SIGNATURE_MOVE[S.profile.id]);
  if(S.scenario && SCENARIO_SIGNATURE_MOVE[S.scenario.id]) ids.push(SCENARIO_SIGNATURE_MOVE[S.scenario.id]);
  return ids.map(actionById).filter(Boolean);
}

// Draws the 3 non-Rest moves for the day: one guaranteed Justice-side,
// one guaranteed Escape-side, and one wildcard from whatever's left —
// only called when a new day actually starts (see chooseAction/
// tryPresentCase/tryAttemptEscape/resetGameState/selectProfile below),
// never on page reload or reference-overlay open/close.
function drawTodayMoves(){
  const pool = getAvailableMovePool();
  const justicePool = pool.filter(a=>a.side==='just');
  const escapePool = pool.filter(a=>a.side==='esc');
  const slot1 = pick(justicePool);
  const slot2 = pick(escapePool);
  const used = new Set([slot1.id, slot2.id]);
  const remainingPool = pool.filter(a=>!used.has(a.id));
  const slot3 = pick(remainingPool);
  S.todayMoves = [slot1.id, slot2.id, slot3.id];
}

// The hard day-floor that used to gate Justice attempts (MIN_JUSTICE_DAY)
// has been removed entirely — Justice is attemptable from day 1, gated
// only by the confidence/chance formula below, exactly like Escape always
// was. Which path is actually faster/likelier still depends on profile via
// that formula, not a fixed calendar floor.

// Step 2 of the agreed 4-step plan: hard gates (evidence>=80, escapePlan>=70)
// are removed entirely. The player can attempt either ending at any time;
// the ODDS (see computeJusticeChance/computeEscapeChance below) carry the
// weight of "are you actually ready," not a blocked button. Simulated and
// tuned against the step-1 formula rebalance — see README for the numbers.

// Justice: a capped number of hearings, with a cooldown that grants back
// +1 attempt at a time (not a full refill) once exhausted — mirrors how
// parole/appeal systems actually work (you don't get to reapply the next
// day). Justice has no "no floor" instruction like Escape does below —
// attempts always eventually regenerate, so a patient player is never
// permanently locked out, only slowed down.
const JUSTICE_MAX_ATTEMPTS = 3;
const JUSTICE_COOLDOWN_DAYS = 25;

// Escape: unlimited attempts, but each failure makes the NEXT one harder —
// guards learn your patterns. Deliberately has no floor: per explicit
// direction, this is allowed to trend toward genuinely hopeless if a player
// just keeps ramming the wall. The only floor is the general [1,95] clamp
// already in computeEscapeChance, which exists for every roll regardless
// of escalation, not as an Escape-specific safety net.
const ESCAPE_ESCALATION_PENALTY = 8; // odds points lost per prior failed attempt

// Trial cycle: a hard calendar deadline running alongside both paths.
// Hitting it either burns an appeal (pushing the deadline back one more
// cycle) or, once appeals run out, ends the game outright — but never
// overwrites a win that already resolved earlier that same day.
const CYCLE_DAYS = { easy: 35, normal: 38, hard: 42, veryhard: 48 };
const APPEALS_ALLOWED = { easy: 1, normal: 2, hard: 3, veryhard: 3 };

function checkTrialDeadline(){
  // a win that already landed today stands — the deadline never overwrites
  // a resolved outcome, whether or not appeals remain.
  if(S.over) return;
  if(S.day < S.trialDeadline) return;
  const scenarioId = S.scenario.id;
  if(S.appealsUsed < APPEALS_ALLOWED[scenarioId]){
    S.appealsUsed += 1;
    S.trialDeadline += CYCLE_DAYS[scenarioId];
    S.log += `\n\nAPPEAL GRANTED — Your attorney's motion buys another cycle; the panel didn't so much rule as reschedule. New trial date: day ${S.trialDeadline}. The sentence stands, for now.`;
  } else {
    flushSessionTime();
    S.over = true;
    S.ending = 'sentence-stands';
    S.view = 'ending';
  }
}

// Attempting either ending IS that day's action (see tryPresentCase /
// tryAttemptEscape below, which spend their own day rather than routing
// through chooseAction) — a failed attempt costs additional days on top of
// that single day, scaled by how underprepared the attempt was.
//
// underpreparedMult: 1x at chance>=40 (a reasonable gamble), scaling up to
// 2.5x as chance approaches 0 (a desperate long-shot) — a failed near-miss
// shouldn't cost nearly as much as flailing at single-digit odds.
function underpreparedMult(chance){
  return Math.max(1, Math.min(2.5, 1 + (40 - chance) / 40 * 1.5));
}

// Justice fail day-cost shrinks as credibility (Lawyer) and experience
// (prior failed hearings) grow — a well-lawyered case that gets denied
// anyway loses less calendar time than a first, underprepared filing.
const JUSTICE_FAIL_EXTRA_DAYS_BASE = 12;

function computeJusticeChance(){
  const intFactor = (S.profile.stats.intellect - 50) * 0.006;
  const raw = 3 + S.evidence * (0.85 + intFactor) + S.pipelineBonus - S.suspicion * 0.3;
  return Math.max(1, Math.min(95, raw));
}

function computeEscapeChance(){
  const physFactor = (S.profile.stats.physique - 50) * 0.006;
  const escalationMult = S.scenario ? S.scenario.security.escalationPenaltyMult : 1;
  const escalation = S.escapeAttemptsUsed * ESCAPE_ESCALATION_PENALTY * escalationMult;
  const raw = 3 + S.escapePlan * (0.85 + physFactor) - S.suspicion * 0.35 - escalation;
  return Math.max(1, Math.min(95, raw));
}

// Qualitative read on the numeric chance, so removing the hard gates doesn't
// leave the player flying blind — an informed gamble, not a blind one.
function confidenceLabel(chance){
  if(chance < 12) return 'hopeless';
  if(chance < 28) return 'flimsy';
  if(chance < 45) return 'shaky';
  if(chance < 62) return 'decent';
  if(chance < 80) return 'solid';
  return 'airtight';
}

function maybeRegenJusticeAttempt(){
  if(S.justiceAttemptsLeft < JUSTICE_MAX_ATTEMPTS && S.justiceCooldownUntil > 0 && S.day >= S.justiceCooldownUntil){
    S.justiceAttemptsLeft += 1;
    S.justiceCooldownUntil = S.justiceAttemptsLeft < JUSTICE_MAX_ATTEMPTS ? S.day + JUSTICE_COOLDOWN_DAYS : 0;
  }
}

function maybeEvent(){
  // Very Hard only: a rare, independent negative event tied to national
  // media attention rather than the day's action — volatility distinct
  // from Hard rather than just "Hard but bigger numbers."
  if(S.scenario && S.scenario.scrutiny.tabloidEvent && rand(1,100) <= 4){
    const susp = rand(10,18), bonusLoss = rand(1,2);
    applyDelta({suspicion:susp});
    S.pipelineBonus = Math.max(0, S.pipelineBonus - bonusLoss);
    return `\n\nTABLOID FLARE-UP — A syndicated piece runs your booking photo beside the senator's under a headline that isn't asking questions. Calls flood your lawyer's office, none of them helpful, and a guard captain decides you need "closer watching" for a while. (+${susp} Suspicion, credibility ground lost)`;
  }
  const roll = rand(1,100);
  const threshold = S.suspicion;
  if(roll <= threshold * 0.6){
    const events = [
      ()=>{
        applyDelta({suspicion:10, evidence:-3, escapePlan:-3});
        return `\n\nLIGHTS FLARE AT 3 A.M. — Cell search. They tear your mattress apart and find nothing, but the write-up goes in your file regardless. Both plans lose ground. (-3 Evidence, -3 Escape Plan, +10 Suspicion)`;
      },
      ()=>{
        applyDelta({suspicion:8, lawyer:-4});
        return `\n\nAn informant sells a rumor about you to the wrong guard. Your lawyer hears the rumor too, and wants a retainer up front before touching your file again. (-4 Lawyer, +8 Suspicion)`;
      },
      ()=>{
        S.day += rand(3,7);
        applyDelta({suspicion:15});
        return `\n\nSANCTION — A contraband sweep names you as a suspect. You draw a week in solitary. The calendar moves without you. (+Days lost, +15 Suspicion)`;
      }
    ];
    return pick(events)();
  }
  if(roll >= 96){
    const good = [
      ()=>{ applyDelta({lawyer:6}); return `\n\nA guard you helped months ago quietly vouches for you at shift briefing — word reaches the parole board's liaison, not just the guard's shift log. (+6 Lawyer)`; },
      ()=>{ applyDelta({escapePlan:6}); return `\n\nSomeone in the crew owes you and pays it forward with a tip on a blind spot. (+6 Escape Plan)`; },
    ];
    return pick(good)();
  }
  return "";
}

function maybeEvidenceChallenge(){
  if(S.evidence < 30) return "";
  const chance = 6 + (S.evidence/100)*14; // 6% at low evidence, up to ~20% near 100
  if(rand(1,100) <= chance){
    const loss = rand(6,14);
    applyDelta({evidence:-loss});
    return `\n\nPUSHBACK — The prosecution flags a hole in your new evidence and moves to have it excluded. The judge agrees to reconsider before ruling. (-${loss} Evidence)`;
  }
  return "";
}

// Connections previously only fed Escape (crew builds it, bribe spends it)
// and only ever HURT Justice (the guard-overuse penalty). This gives it a
// real, if secondary, Justice payoff too: once your prison network has any
// real substance, it occasionally surfaces something usable for your case —
// a name, a rumor with teeth, dirt on the arresting officer. Deliberately
// rare and modest so it stays a bonus, not an alternate route to Evidence;
// an Escape-focused player who happens to build Connections gets a nice
// side effect, not a free second strategy. The threshold is intentionally
// LOW (15, not e.g. 40) — under normal crew/scout/bribe rotation, bribe
// keeps draining Connections back down almost as fast as crew builds it
// (simulation showed a typical peak of ~20 under that rotation), so a
// higher threshold would rarely or never trigger for a typical Escape
// playthrough, defeating the point of giving Connections real dual-use.
const CONNECTIONS_GRAPEVINE_THRESHOLD = 15;
const GRAPEVINE_CHANCE = 15; // % per day, only once threshold is met

function maybeGrapevineTip(){
  if(S.connections < CONNECTIONS_GRAPEVINE_THRESHOLD) return "";
  if(rand(1,100) <= GRAPEVINE_CHANCE){
    const e = rand(4,9);
    applyDelta({evidence:e});
    return `\n\nWORD FROM THE YARD — Someone in your network passes along something real: a name, a grudge with details, a guard's disciplinary file the prosecutor hasn't found yet. It's not much on its own, but it's usable. (+${e} Evidence)`;
  }
  return "";
}

function tryAttemptEscape(){
  // Attempting IS the day's action — it never happens alongside a build
  // action on the same day, and it spends its own day directly rather than
  // going through chooseAction().
  S.day += 1;
  const chance = computeEscapeChance();
  const roll = rand(1,100);
  if(roll <= chance){
    flushSessionTime();
    S.over = true; S.ending = 'escape-win'; S.view = 'ending';
  } else {
    const mult = underpreparedMult(chance);
    const baseDays = rand(10,25);
    const escalationDays = S.escapeAttemptsUsed * 5; // prior failed escape attempts, before this one
    const totalDays = Math.min(60, baseDays + escalationDays);
    S.escapeAttemptsUsed += 1;
    S.day += totalDays;
    applyDelta({suspicion:Math.round(100*mult), escapePlan:-Math.round(40*mult), connections:-Math.round(20*mult)});
    S.log = `The tunnel map was three years out of date — they rerouted the pipe last winter. Caught at the fence line. It costs you dearly: ${totalDays} days in solitary, your network gutted, every guard now watching your hands instead of your face. Worse — they've seen this move now. Next time will be harder.\n\nYou start rebuilding, if you choose to keep going.`;
    checkTrialDeadline();
    if(!S.over) drawTodayMoves(); // a new day started — redraw the 3 offered moves
    renderAfterFail();
    return;
  }
  checkTrialDeadline();
  render();
}

function tryPresentCase(){
  if(S.justiceAttemptsLeft <= 0) return; // button should be disabled in this state; guard anyway
  // Attempting IS the day's action — same rule as Escape above.
  S.day += 1;
  const chance = computeJusticeChance();
  S.justiceAttemptsLeft -= 1;
  if(S.justiceAttemptsLeft === 0) S.justiceCooldownUntil = S.day + JUSTICE_COOLDOWN_DAYS;
  const roll = rand(1,100);
  if(roll <= chance){
    flushSessionTime();
    S.over = true; S.ending = 'justice-win'; S.view = 'ending';
  } else {
    const mult = underpreparedMult(chance);
    const credibilityFactor = rampEfficiency(S.lawyer, S.scenario.scrutiny.lawyerThreshold, 0.55);
    const attemptDiscount = Math.max(0.6, 1 - 0.15 * S.justiceAttemptsUsed); // prior failed hearings, before this one
    const extraDays = Math.round(JUSTICE_FAIL_EXTRA_DAYS_BASE * credibilityFactor * attemptDiscount);
    S.justiceAttemptsUsed += 1;
    S.day += extraDays;
    applyDelta({suspicion:Math.round(10*mult), evidence:-Math.round(10*mult)});
    const remaining = S.justiceAttemptsLeft;
    const remainingNote = remaining > 0
      ? `You have ${remaining} hearing${remaining===1?'':'s'} left before you'll need to wait out a new one.`
      : `That was your last scheduled hearing for now — the board won't see you again for a while.`;
    S.log = `The parole board reads your file, glances at the disciplinary notes sitting beside your appeal, and denies it in four minutes flat. "Insufficient corroboration," the letter says. It costs you ${extraDays} day${extraDays===1?'':'s'} of stalled paperwork on top of today. ${remainingNote}`;
    checkTrialDeadline();
    if(!S.over) drawTodayMoves(); // a new day started — redraw the 3 offered moves
    render();
    return;
  }
  checkTrialDeadline();
  render();
}

function renderAfterFail(){ render(); }

function chooseAction(a){
  if(S.over) return;
  S.day += 1;
  maybeRegenJusticeAttempt();

  // Reset today's log now — checkMilestones() (invoked from inside applyDelta,
  // below) appends narrative beats directly to S.log as they fire, so it must
  // be empty before any of today's applyDelta calls happen, not overwritten
  // after the fact (that would silently wipe out any milestone text).
  S.log = '';

  // ambient suspicion drift — time and routine scrutiny work against you regardless of choice
  applyDelta({suspicion:2});

  // diminishing returns for repeating the same move back-to-back
  if(a.id === S.lastActionId){
    S.actionStreak += 1;
  } else {
    S.actionStreak = 1;
  }
  S.lastActionId = a.id;
  const mult = Math.max(0.5, 1 - 0.12*(S.actionStreak-1));

  S.actionCounts[a.id] = (S.actionCounts[a.id] || 0) + 1;

  let msg = a.run(mult);
  msg += maybeGrapevineTip();
  msg += maybeEvidenceChallenge();
  msg += maybeEvent();
  S.log = msg + S.log; // main narrative first, then any milestone beats that fired today
  checkTrialDeadline();
  if(!S.over) drawTodayMoves(); // a new day started — redraw the 3 offered moves
  render();
}

function pulseClass(key, current){
  const prev = prevStats[key];
  if(prev === undefined || current === prev) return '';
  if(key === 'suspicion') return current > prev ? 'pulse-warn' : 'pulse-up';
  return current > prev ? 'pulse-up' : 'pulse-warn';
}

function statBlock(){
  const html = `
  <div class="stats">
    <div class="stat"><div class="k">Connections</div><div class="v ${pulseClass('connections',S.connections)}">${S.connections}</div></div>
    <div class="stat ${S.suspicion>=60?'warn':''}"><div class="k">Suspicion</div><div class="v ${pulseClass('suspicion',S.suspicion)}">${S.suspicion}</div></div>
  </div>`;
  return html;
}

function gaugeBlock(){
  return `
  <div class="gauge-block">
    <div class="gauge-labels"><span class="just ${pulseClass('evidence',S.evidence)}">EVIDENCE ${S.evidence}</span><span class="esc ${pulseClass('escapePlan',S.escapePlan)}">ESCAPE PLAN ${S.escapePlan}</span></div>
    <div class="gauge">
      <div class="gauge-fill-just" style="width:${S.evidence/2}%"></div>
      <div class="gauge-fill-esc" style="width:${S.escapePlan/2}%"></div>
      <div class="gauge-mid"></div>
    </div>
  </div>`;
}

// ---------------------------------------------------------------------
// Grading — computed once, at the ending screen, from the final day
// count, which path won, and how many failed attempts (of either kind)
// were spent getting there. Purely a summary; never feeds back into
// gameplay.
// ---------------------------------------------------------------------

const PAR_DAYS = { easy:12, normal:16, hard:17, veryhard:17 };
const DIFFICULTY_MULTIPLIER = { easy:0.85, normal:1.0, hard:1.15, veryhard:1.3 };
const DIFFICULTY_CEILING = { easy:'B-', normal:'B+', hard:'A-', veryhard:null };
const GRADE_ORDER = ['F','D','C-','C','C+','B-','B','B+','A-','A','A+'];

// Per-profile statistical lean: which ending plays to strength vs. against
// the grain. Everyman has no lean — pathFit is always 0, and it can't earn
// the Elite badge, which requires winning via a weak path it doesn't have.
const PATH_LEAN = {
  strategist:  { strong:'justice', weak:'escape' },
  giant:       { strong:'escape',  weak:'justice' },
  manipulator: { strong:'justice', weak:'escape' },
  everyman:    null
};

function letterForScore(rawScore){
  if(rawScore >= 140) return 'A+';
  if(rawScore >= 120) return 'A';
  if(rawScore >= 105) return 'A-';
  if(rawScore >= 90)  return 'B+';
  if(rawScore >= 75)  return 'B';
  if(rawScore >= 60)  return 'B-';
  if(rawScore >= 45)  return 'C+';
  if(rawScore >= 30)  return 'C';
  if(rawScore >= 15)  return 'C-';
  if(rawScore >= 0)   return 'D';
  return 'F';
}

function computeGrade(){
  const scenarioId = S.scenario.id;
  const winPath = S.ending === 'justice-win' ? 'justice' : 'escape';
  const par = PAR_DAYS[scenarioId];
  const efficiency = Math.min(100, Math.round(100 * par / S.day));
  const lean = PATH_LEAN[S.profile.id];
  const pathFit = lean ? (winPath === lean.strong ? -15 : 15) : 0;
  const justiceBonus = winPath === 'justice' ? 10 : 0;
  const attemptPenalty = 6 * (S.justiceAttemptsUsed + S.escapeAttemptsUsed);
  const difficultyMultiplier = DIFFICULTY_MULTIPLIER[scenarioId];
  const rawScore = (efficiency + pathFit + justiceBonus - attemptPenalty) * difficultyMultiplier;

  let letter = letterForScore(rawScore);
  // Difficulty ceiling is applied AFTER the letter is assigned — it can
  // only clamp down, never bump a low raw score up to meet it.
  const ceiling = DIFFICULTY_CEILING[scenarioId];
  if(ceiling && GRADE_ORDER.indexOf(letter) > GRADE_ORDER.indexOf(ceiling)){
    letter = ceiling;
  }

  const elite = scenarioId === 'veryhard' && !!lean && winPath === lean.weak &&
    S.justiceAttemptsUsed === 0 && S.escapeAttemptsUsed === 0 && rawScore >= 120;

  return { letter, rawScore, pathFit, winPath, scenarioId, elite, durationMs: S.durationMs };
}

// Base band+path text — 11 letter bands x 2 winning paths.
const GRADE_BAND_TEXT = {

    escape:  "Gone without a trace anyone could act on. No alarm reached you in time to matter. Whoever reviews this file will find nothing but a closed door and an empty bunk."
  },
  'A': {
    justice: "The evidence did the talking, and it didn't take long. A clean exoneration, no theatrics required.",
    escape:  "A sharp, quiet exit. Whatever they thought they had locked down, it wasn't you."
  },
  'A-': {
    justice: "The case held up, though not without a few uncomfortable questions along the way. Still — dismissed.",
    escape:  "You're out, and it cost you more nerve than it should have. The fence line remembers you, but you're not behind it."
  },
  'B+': {
    justice: "The board came around, eventually. A few holes in the case got patched just in time.",
    escape:  "Out, mostly on instinct. A couple of close calls that could've gone differently."
  },
  'B': {
    justice: "It took longer than a clean case should, but the paperwork finally caught up to the truth.",
    escape:  "You made it past the wall, dragging a few mistakes behind you. Nobody's asking how — they're just glad it's over."
  },
  'B-': {
    justice: "The board granted it, reluctantly, after more rejections than a strong case should need.",
    escape:  "A messy, loud way out. You're free. The block's still talking about how."
  },
  'C+': {
    justice: "Denied, denied, denied — until, somehow, not. The file's thick with reasons this shouldn't have worked.",
    escape:  "You got over the wall on the third — or fourth, or fifth — try. Persistence, not planning."
  },
  'C': {
    justice: "A war of attrition with the parole board, won on exhaustion more than evidence.",
    escape:  "Every failed run cost you dearly. The one that finally worked barely looked different from the ones that didn't."
  },
  'C-': {
    justice: "The board said yes the way you say yes to something you're tired of hearing about. Out, barely, and it shows.",
    escape:  "You're out, held together by luck and whatever was left of the plan by the last attempt."
  },

    justice: "Dismissed, technically. The file reads less like justice and more like paperwork nobody wanted to keep processing.",
    escape:  "You're free. The how doesn't reflect well on the why."

    escape:  "You got lucky exactly once, after a long run of not. The file doesn't call it a plan."
  }
};

// Playing-to-type ("type") vs. against-the-grain ("grain") clause per
// profile. Everyman has no lean, so both entries are identical.
const PROFILE_CLAUSES = {
  strategist: {
    type:  "exactly the kind of case a sharp mind builds",
    grain: "not the kind of exit anyone expected from a mind built for paperwork, not fences"
  },
  giant: {
    type:  "the kind of exit a man his size doesn't need to explain",
    grain: "not the kind of case anyone expected to hold up from someone who'd rather use his hands than a law book"
  },
  manipulator: {
    type:  "the board never stood a chance against that kind of charm",
    grain: "not the kind of run you'd expect from someone who talks his way out of everything else"
  },
  everyman: {
    type:  "nothing flashy — just steady, unremarkable competence",
    grain: "nothing flashy — just steady, unremarkable competence"
  }
};

const SCENARIO_CLAUSES = {
  easy:     "for a case nobody outside this block was ever going to remember",
  normal:   "for a case that never stopped being personal",
  hard:     "with the press still parked outside",
  veryhard: "with half the country watching this file specifically"
};

const ELITE_TEXT = {
  justice: "THE HARD WAY — First hearing. No prior rejections, no second chances needed. The board read the file once and let you go.",
  escape:  "THE HARD WAY — First attempt, no dry runs. You read the wall once and found the gap nobody else saw."
};

function buildGradeComment(grade){
  const base = GRADE_BAND_TEXT[grade.letter][grade.winPath];
  const clauses = PROFILE_CLAUSES[S.profile.id];
  const profileClause = grade.pathFit === -15 ? clauses.type : clauses.grain;
  const scenarioClause = SCENARIO_CLAUSES[grade.scenarioId];
  return `${base} — ${profileClause}, ${scenarioClause}.`;
}

// ---------------------------------------------------------------------
// Shared leaderboard — Supabase-backed. Submission is only offered on WIN
// endings; the 'sentence-stands' loss never reaches this code path.
// ---------------------------------------------------------------------

function startEditHandle(){
  S.editingHandle = true;
  S.handleError = null;
  render();
}

function cancelEditHandle(){
  S.editingHandle = false;
  S.handleError = null;
  render();
}

function confirmHandleAndSubmit(){
  const input = document.getElementById('handleInput');
  let name = input ? input.value.trim() : '';
  if(!name){
    S.handleError = 'Enter a name before submitting.';
    render();
    return;
  }
  name = name.slice(0,24);
  S.playerHandle = name;
  savePlayerHandle(name);
  S.editingHandle = false;
  S.handleError = null;
  submitToLeaderboard();
}

async function submitToLeaderboard(){
  if(S.submittedThisGame || S.submitState === 'submitting') return;
  const grade = computeGrade();
  S.submitState = 'submitting';
  S.submitError = null;
  render();
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${LEADERBOARD_TABLE}`, {
      method:'POST',
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type':'application/json',
        Prefer:'return=minimal'
      },
      body: JSON.stringify({
        player_name: S.playerHandle,
        profile: S.profile.id,
        scenario: S.scenario.id,
        final_day: S.day,
        duration_ms: S.durationMs,
        letter_grade: grade.letter,
        raw_score: grade.rawScore,
        elite: grade.elite
      })
    });
    if(!res.ok) throw new Error(`Request failed (${res.status})`);
    S.submittedThisGame = true;
    S.submitState = 'done';
  }catch(e){
    S.submitState = 'error';
    S.submitError = "Couldn't reach the leaderboard. Check your connection and try again.";
  }
  render();
}

function leaderboardSubmitBlock(){
  let html = '';
  if(S.submittedThisGame){
    html += `<div class="lb-msg">Added to the record.</div>`;
  } else if(!S.playerHandle || S.editingHandle){
    html += `
    <div class="lb-namebox">
      <input id="handleInput" class="lb-input" maxlength="24" placeholder="Pick a name for the record" value="${escapeHtml(S.playerHandle || '')}">
      <button class="action attempt" onclick="confirmHandleAndSubmit()">Save name &amp; submit</button>
      ${S.playerHandle ? `<button class="restart-link" onclick="cancelEditHandle()">cancel</button>` : ''}
    </div>
    ${S.handleError ? `<div class="lb-error"><div>${escapeHtml(S.handleError)}</div></div>` : ''}`;
  } else {
    html += `
    <div class="lb-submitbox">
      <button class="action attempt" ${S.submitState==='submitting'?'disabled':''} onclick="submitToLeaderboard()">${S.submitState==='submitting' ? 'Submitting…' : `Submit to Leaderboard as ${escapeHtml(S.playerHandle)}`}</button>
      <button class="restart-link" onclick="startEditHandle()">not you? change name</button>
    </div>
    ${S.submitState==='error' ? `<div class="lb-error"><div>${escapeHtml(S.submitError)}</div><button class="action attempt" onclick="submitToLeaderboard()">Retry</button></div>` : ''}`;
  }
  html += `<button class="restart" onclick="openLeaderboard('ending')" style="margin-top:8px;">View Leaderboard</button>`;
  return html;
}

const LEADERBOARD_FILTERS = [
  { id:'all', label:'All' },
  { id:'strategist', label:'Strategist' },
  { id:'giant', label:'Gentle Giant' },
  { id:'manipulator', label:'Manipulator' },
  { id:'everyman', label:'Everyman' }
];

function profileNameById(id){
  const p = PROFILES.find(p=>p.id===id);
  return p ? p.name : id;
}

function scenarioNameById(id){
  const s = SCENARIOS.find(s=>s.id===id);
  return s ? s.name : id;
}

function openLeaderboard(fromView){
  S.leaderboardReturnView = fromView || S.view;
  S.view = 'leaderboard';
  S.leaderboardEntries = null;
  S.leaderboardError = null;
  fetchLeaderboard();
}

function closeLeaderboard(){
  S.view = S.leaderboardReturnView || 'home';
  S.leaderboardReturnView = null;
  render();
}

function setLeaderboardFilter(id){
  if(S.leaderboardFilter === id) return;
  S.leaderboardFilter = id;
  fetchLeaderboard();
}

async function fetchLeaderboard(){
  S.leaderboardLoading = true;
  S.leaderboardError = null;
  render();
  try{
    let url = `${SUPABASE_URL}/rest/v1/${LEADERBOARD_TABLE}?select=*&order=raw_score.desc&limit=50`;
    if(S.leaderboardFilter !== 'all') url += `&profile=eq.${encodeURIComponent(S.leaderboardFilter)}`;
    const res = await fetch(url, {
      headers:{ apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if(!res.ok) throw new Error(`Request failed (${res.status})`);
    const data = await res.json();
    S.leaderboardEntries = Array.isArray(data) ? data : [];
  }catch(e){
    S.leaderboardError = "Couldn't load the leaderboard. Check your connection and try again.";
  }
  S.leaderboardLoading = false;
  render();
}

function renderLeaderboardView(){
  const rows = S.leaderboardEntries || [];
  let bodyHtml;
  if(S.leaderboardLoading){
    bodyHtml = `<div class="log"><span class="tag">LEADERBOARD</span>Loading the record…</div>`;
  } else if(S.leaderboardError){
    bodyHtml = `<div class="lb-error"><div>${escapeHtml(S.leaderboardError)}</div><button class="action attempt" onclick="fetchLeaderboard()">Retry</button></div>`;
  } else if(rows.length === 0){
    bodyHtml = `<div class="log"><span class="tag">LEADERBOARD</span>No entries yet. Be the first case on record.</div>`;
  } else {
    bodyHtml = `<div class="lb-list">
      ${rows.map((r,i)=>`
        <div class="lb-row">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-info">
            <div class="lb-name">${escapeHtml(r.player_name)}${r.elite ? '<span class="lb-elite">ELITE</span>' : ''}</div>
            <div class="lb-meta">${escapeHtml(profileNameById(r.profile))} &middot; ${escapeHtml(scenarioNameById(r.scenario))} &middot; Day ${Number(r.final_day)||0} &middot; ${formatDuration(Number(r.duration_ms)||0)}</div>
          </div>
          <div class="lb-grade">${escapeHtml(r.letter_grade || '')}</div>
        </div>
      `).join('')}
    </div>`;
  }
  return `
  <div class="masthead">
    <div><h1>Two Ways Out</h1><div class="case">LEADERBOARD</div></div>
  </div>
  <button class="back-btn" onclick="closeLeaderboard()">&larr; Back</button>
  <div class="section-label">Filter by character</div>
  <div class="lb-tabs">
    ${LEADERBOARD_FILTERS.map(f=>`<button class="ref-tab ${S.leaderboardFilter===f.id?'active':''}" onclick="setLeaderboardFilter('${f.id}')">${f.label}</button>`).join('')}
  </div>
  ${bodyHtml}
  `;
}

function buildShareText(){
  if(S.ending === 'sentence-stands'){
    return `CASE NO. 4471 — SENTENCE UPHELD\n${S.profile.name} · ${S.scenario.tier}\n${S.day} days · Appeals exhausted\n${SHARE_URL}`;
  }
  const grade = computeGrade();
  const pathName = grade.winPath === 'justice' ? 'Justice' : 'Escape';
  return `CASE NO. 4471 — CLOSED\n${S.profile.name} · ${S.scenario.tier} · ${pathName}${grade.elite ? ' · ELITE' : ''}\n${S.day} days · Grade: ${grade.letter}\n${SHARE_URL}`;
}

async function shareResult(){
  const text = buildShareText();
  if(navigator.share){
    try{
      await navigator.share({ text });
    }catch(err){
      if(err && err.name === 'AbortError') return;
      S.shareStatus = 'error';
      S.shareError = "Couldn't open the share sheet.";
      render();
    }
    return;
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{
      await navigator.clipboard.writeText(text);
      S.shareStatus = 'copied';
      render();
      return;
    }catch(err){
      // fall through to the manual-copy textarea below
    }
  }
  S.shareStatus = 'manual';
  render();
}

function shareBlock(){
  let note = '';
  if(S.shareStatus === 'copied'){
    note = `<div class="share-note">Copied to clipboard.</div>`;
  } else if(S.shareStatus === 'manual'){
    note = `
    <div class="share-note">Copy this text manually:</div>
    <textarea class="share-manual" rows="4" readonly onclick="this.select()">${escapeHtml(buildShareText())}</textarea>`;
  } else if(S.shareStatus === 'error'){
    note = `<div class="share-note">${escapeHtml(S.shareError || '')}</div>`;
  }
  return `
  <button class="restart" onclick="shareResult()" style="margin-top:8px;">Share Result</button>
  ${note}`;
}

function resetGameState(){
  const famStart = S.scenario ? S.scenario.family.start : 15;
  S.day=1; S.durationMs=0; S.sessionStartTs=null;
  S.family=famStart; S.lawyer=0; S.media=0; S.pipelineMilestones={}; S.pipelineBonus=0;
  S.connections=15; S.evidence=5; S.escapePlan=5; S.suspicion=10;
  S.over=false; S.ending=null;
  S.lastActionId=null; S.actionStreak=0;
  S.actionCounts = { library:0, guard:0, letters:0, crew:0, scout:0, bribe:0, rest:0 };
  S.justiceAttemptsLeft = JUSTICE_MAX_ATTEMPTS;
  S.justiceCooldownUntil = 0;
  S.escapeAttemptsUsed = 0;
  S.justiceAttemptsUsed = 0;
  S.appealsUsed = 0;
  S.trialDeadline = S.scenario ? CYCLE_DAYS[S.scenario.id] : null;
  S.pendingConfirm = null;
  S.submittedThisGame = false;
  S.submitState = 'idle';
  S.submitError = null;
  S.editingHandle = false;
  S.handleError = null;
  S.shareStatus = null;
  S.shareError = null;
  S.unlockedMoveIds = [];
  S.todayMoves = [];
  S.log = "New cell, same choice. You wake up on the concrete shelf they call a bunk. Nobody's listening yet. Today, you decide what kind of man gets you out.";
  prevStats = { connections:S.connections, evidence:S.evidence, escapePlan:S.escapePlan, suspicion:S.suspicion };
  // profile & scenario are both already set for a same-character/same-case
  // restart (see restart() below) — draw day 1's moves immediately so the
  // game view never renders with an empty move list. When either is still
  // null (changeProfile/changeDifficulty, on their way back to selection
  // screens), selectProfile() below draws once both are set again.
  if(S.scenario && S.profile) drawTodayMoves();
}

function restart(){
  // keeps the current profile — a fresh case, same character
  resetGameState();
  clearSave();
  S.view = 'game';
  resumeSessionTime();
  render();
}

function changeProfile(){
  // fresh case AND a fresh character — back to profile selection
  resetGameState();
  S.profile = null;
  clearSave();
  S.view = 'profile';
  render();
}

function changeDifficulty(){
  // fresh case, fresh character, AND a fresh scenario — all the way back
  // to the very start of the flow, not just profile selection
  resetGameState();
  S.profile = null;
  S.scenario = null;
  clearSave();
  S.view = 'scenario';
  render();
}

function confirmRestart(){
  // Native confirm()/alert()/prompt() dialogs are blocked or silently
  // no-op in several real-world contexts this file can end up running in
  // (sandboxed previews, some embedded webviews) — relying on confirm()
  // meant the button would just do nothing there, with no visible error.
  // This shows an in-page confirmation instead, using the same render()
  // pipeline as everything else, so it works identically everywhere.
  S.pendingConfirm = 'restart';
  render();
}

function confirmChangeProfile(){
  S.pendingConfirm = 'changeProfile';
  render();
}

function confirmChangeDifficulty(){
  S.pendingConfirm = 'changeDifficulty';
  render();
}

function cancelPendingConfirm(){
  S.pendingConfirm = null;
  render();
}

function executePendingConfirm(){
  if(S.pendingConfirm === 'restart') restart();
  else if(S.pendingConfirm === 'changeProfile') changeProfile();
  else if(S.pendingConfirm === 'changeDifficulty') changeDifficulty();
  else if(S.pendingConfirm === 'goToPlay') startNewGame();
}

function selectScenario(id){
  S.scenario = SCENARIOS.find(s=>s.id===id);
  S.appealsUsed = 0;
  S.trialDeadline = CYCLE_DAYS[id];
  S.view = 'profile';
  saveState();
  render();
}

function selectProfile(id){
  S.profile = PROFILES.find(p=>p.id===id);
  if(S.scenario) drawTodayMoves(); // day 1 — both profile and scenario are now set
  S.view = 'game';
  resumeSessionTime();
  saveState();
  render();
}

function hasActiveGame(){
  return !!(S.scenario && S.profile && !S.over);
}

// ---------------------------------------------------------------------
// Real-world play duration — a pure statistic for a future Ranking table.
// Never read by grading. Ticks only while S.view is 'game' and the tab is
// visible; paused on tab-hide/pagehide and finalized once the game ends.
// ---------------------------------------------------------------------
function flushSessionTime(){
  if(S.sessionStartTs != null){
    S.durationMs += Date.now() - S.sessionStartTs;
    S.sessionStartTs = null;
  }
}

function resumeSessionTime(){
  if(S.view === 'game' && hasActiveGame() && S.sessionStartTs == null){
    S.sessionStartTs = Date.now();
  }
}

function formatDuration(ms){
  const totalMinutes = Math.round(ms / 60000);
  if(totalMinutes < 60) return `${totalMinutes} minute${totalMinutes===1?'':'s'}`;
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  const hourStr = `${hours} hour${hours===1?'':'s'}`;
  return minutes > 0 ? `${hourStr} ${minutes} minute${minutes===1?'':'s'}` : hourStr;
}

function goToPlay(){
  if(hasActiveGame()){
    S.pendingConfirm = 'goToPlay';
    render();
    return;
  }
  startNewGame();
}

function startNewGame(){
  resetGameState();
  S.profile = null;
  S.scenario = null;
  clearSave();
  S.view = 'scenario';
  render();
}

function continueGame(){
  if(!hasActiveGame()) return;
  S.view = 'game';
  resumeSessionTime();
  render();
}

function goHome(){
  flushSessionTime();
  S.view = 'home';
  render();
}

function openReference(page){
  S.referenceReturnView = S.view;

function closeReference(){

function refGoto(page){

        <button class="category" onclick="selectProfile('${p.id}')">
          ${p.name}
          <span class="desc">${p.tagline}<br>${p.desc}<br>INT ${p.stats.intellect} · PHY ${p.stats.physique} · CHA ${p.stats.charisma} · COM ${p.stats.composure}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function renderGameView(){
  maybeRegenJusticeAttempt();

  const justiceChance = computeJusticeChance();
  const escapeChance = computeEscapeChance();
  const canJustice = S.justiceAttemptsLeft > 0;
  // Escape has no gate at all — it's always attemptable; odds alone communicate readiness.

  let justiceDisabledReason = '';
  if(S.justiceAttemptsLeft <= 0) justiceDisabledReason = `— next hearing available day ${S.justiceCooldownUntil}`;

  const restAction = actionById('rest');
  const todayActions = S.todayMoves.map(actionById).filter(Boolean);
  const movesHtml = `
    <div class="actions">
      <button class="action" onclick="chooseAction(ACTIONS.find(x=>x.id==='rest'))">
        ${restAction.label}
        <span class="desc">${restAction.desc}</span>
      </button>
      ${todayActions.map(a=>`
        <button class="action ${a.side==='esc'?'esc':''}" onclick="chooseAction(ACTIONS.find(x=>x.id==='${a.id}'))">
          ${a.label}
          <span class="desc">${a.desc}</span>
        </button>
      `).join('')}
    </div>`;

  const html = `
    <div class="masthead">
      <div>
        <div style="display:flex;align-items:center;gap:8px;">
          <h1 class="tappable" style="margin:0;" onclick="goHome()">Two Ways Out</h1>
          ${refButtonHtml()}
        </div>
        <div class="case">CASE NO. 4471 &middot; ${S.profile.name.toUpperCase()} &middot; ${S.scenario.tier}</div><button class="restart-link" onclick="confirmRestart()">Abandon case &amp; restart</button><button class="restart-link" onclick="confirmChangeProfile()">Change character</button><button class="restart-link" onclick="confirmChangeDifficulty()">Change difficulty</button>
      </div>
      <div class="day-badge">${S.day}<span>DAY</span>
        <div class="trial-countdown">Trial in ${Math.max(0, S.trialDeadline - S.day)} days</div>
      </div>
    </div>

    ${S.pendingConfirm ? `
    <div class="confirm-banner">
      <div class="msg">${{
        restart: 'Abandon this case and start over with the same character? Your current progress will be lost.',
        changeProfile: 'Abandon this case and pick a different character? Your current progress will be lost.',
        changeDifficulty: 'Abandon this case entirely and pick a different case and character? Your current progress will be lost.'
      }[S.pendingConfirm]}</div>
      <div class="btns">
        <button class="confirm-yes" onclick="executePendingConfirm()">Yes, ${{restart:'restart', changeProfile:'change character', changeDifficulty:'change difficulty'}[S.pendingConfirm]}</button>
        <button onclick="cancelPendingConfirm()">Cancel</button>
      </div>
    </div>` : ''}

    ${gaugeBlock()}
    ${statBlock()}

    <div class="log"><span class="tag">LOG</span>${S.log}</div>

    <div class="section-label">Today's move</div>
    ${movesHtml}

    <div class="section-label">When you're ready</div>
    <div class="actions">
      <button class="action attempt" ${canJustice?'':'disabled'} onclick="tryPresentCase()">
        Present your case to the parole board
        <span class="desc">Feels ${confidenceLabel(justiceChance)} ${justiceDisabledReason || `· ${S.justiceAttemptsLeft} hearing${S.justiceAttemptsLeft===1?'':'s'} available`}</span>
      </button>
      <button class="action attempt esc" onclick="tryAttemptEscape()">
        Attempt the escape tonight
        <span class="desc">Feels ${confidenceLabel(escapeChance)}${S.escapeAttemptsUsed>0 ? ` · they're onto your patterns after ${S.escapeAttemptsUsed} attempt${S.escapeAttemptsUsed===1?'':'s'}` : ''}</span>
      </button>
    </div>
  `;

  prevStats = { connections:S.connections, evidence:S.evidence, escapePlan:S.escapePlan, suspicion:S.suspicion };
  return html;
}

function render(){
  const app = document.getElementById('app');

  if(S.view === 'ending'){
    app.innerHTML = renderEndingView();
    clearSave();
    return;
  }

  let mainHtml;
  if(S.view === 'scenario'){
    mainHtml = renderScenarioView();
  } else if(S.view === 'profile'){
    mainHtml = renderProfileView();
  } else if(S.view === 'game'){
    mainHtml = renderGameView();
  } else if(S.view === 'leaderboard'){
    mainHtml = renderLeaderboardView();
  } else {
    mainHtml = renderHomeView();
  }

  app.innerHTML = mainHtml + (S.referenceOpen ? referenceOverlayHtml() : '');
  saveState();
}

loadState();
loadPlayerHandle();
// a fresh page load starts a brand-new JS context — any sessionStartTs
// carried over from before the reload (or a crash that skipped pagehide)
// is stale and must not be trusted; the timer only resumes once the
// game view is actually reached again (see resumeSessionTime() callers).
S.sessionStartTs = null;
if(!Number.isFinite(S.durationMs)) S.durationMs = 0;
if(S.scenario && S.trialDeadline == null) S.trialDeadline = CYCLE_DAYS[S.scenario.id]; // guard against saves from before the trial deadline system existed
// guard against saves from before the dynamic move pool existed, or a
// corrupt/missing draw — reloading mid-decision must otherwise show the
// exact same 3 moves already offered, never a fresh draw
if(!Array.isArray(S.unlockedMoveIds)) S.unlockedMoveIds = [];
if(S.scenario && S.profile){
  checkMoveUnlocks(); // catches saves whose stats already crossed a threshold pre-feature
  if(!Array.isArray(S.todayMoves) || S.todayMoves.length !== 3 || S.todayMoves.some(id=>!actionById(id))){
    drawTodayMoves();
  }
}
// Home is always the entry point on load — an in-progress game is offered
// via Continue rather than auto-resumed into, and any overlay state from a
// prior session shouldn't carry over onto a freshly loaded screen.
S.view = 'home';
S.referenceOpen = false;
S.referenceReturnView = null;
S.leaderboardReturnView = null;
S.leaderboardEntries = null;
S.leaderboardError = null;
S.leaderboardFilter = 'all';
render();

document.addEventListener('visibilitychange', () => {
  if(document.hidden){
    flushSessionTime();
    saveState();
  } else {
    resumeSessionTime();
  }
});

window.addEventListener('pagehide', () => {
  flushSessionTime();
  saveState();
});
</script>
